<!DOCTYPE html>
<html lang="en">
<head>
 <title>MovieSphere</title>
 <link rel="stylesheet" href="style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>


<body class="dark">


 <!-- navbar -->
 <nav>

   <h2 class="logo">MovieSphere</h2>

   <div class="nav-links">
     <a href="#">Home</a>
     <a href="#">Movies</a>
     <a href="#">Favorites</a>
   </div>

   <div class="nav-actions">
     <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
     <input type="text" id="navSearch" placeholder="Search movies...">

     <div class="toggle" onclick="toggleMode()">
       <div class="circle"></div>
     </div>

   </div>

 </nav>

 <!-- HERO -->
<section class="hero">


 <!-- LEFT -->
 <div class="hero-left">
   <img id="heroPoster" src="" alt="movie">
 </div>


 <!-- RIGHT -->
 <div class="hero-right">
   <h1 id="heroTitle">Movie Title</h1>
   <p id="heroText">Explore movies and discover your next watch</p>


   <div class="hero-buttons">
     <button>▶ Play</button>
     <button>+ Watchlist</button>
   </div>
 </div>


</section>


</body>
</html>
