<!DOCTYPE html>
<html lang="en">
<head>
 <title>MovieSphere</title>
 <link rel="stylesheet" href="style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>


<body class="light">


 <!-- Navbar -->
 <nav>

   <h2 class="logo">MovieSphere</h2>

   <div class="nav-links">
     <a href="#">Home</a>
     <a href="#">Movies</a>
     <a href="#">Favorites</a>
     <a href="watchlist.html">Watchlist</a>
   </div>

   <div class="nav-actions">
     <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
     <input type="text" id="navSearch" placeholder="Search movies...">

    <button id="searchBtn">Search</button>

     <div class="toggle" onclick="toggleMode()">
       <div class="circle"></div>
     </div>

   </div>

 </nav>

 <!-- Hero section-->
<section class="hero-clean">
  <div class="hero-container">
    <div class="hero-left">
      <img id="heroPoster" src="" alt="movie poster">
    </div>
    <div class="hero-right">
      <h1 id="heroTitle">Movie Title</h1>
      <p id="heroText">Description appears here...</p>
      <div class="hero-btns">
        <button class="play-btn">▶ Play</button>
        <button class="watchlist-btn" onclick="addToWatchlistFromHero()">+ Watchlist</button>
      </div>
    </div>
  </div>
</section>

<!-- Movies -->
 <section class="movies-section">
   <h2></h2>
   <div style="padding: 0 60px;">
  <label for="sortSelect">Sort By: </label>
  <select id="sortSelect" style="padding: 5px; border-radius: 4px;">
    <option value="default">Default</option>
    <option value="year-desc">Newest First</option>
    <option value="year-asc">Oldest First</option>
    <option value="alpha">Alphabetical (A-Z)</option>
  </select>
</div>

   <div id="movies"></div>
 </section>
<section class="category">
  <h2>Comedy</h2>
  <div class="row" id="comedy"></div>
</section>

<section class="category">
  <h2>Romance</h2>
  <div class="row" id="romance"></div>
</section>

<section class="category">
  <h2>Sci-Fi</h2>
  <div class="row" id="scifi"></div>
</section>

<section class="category">
  <h2>Action</h2>
  <div class="row" id="action"></div>
</section>
<select id="genreFilter" style="padding: 8px; margin-left: 10px;">
    <option value="all">All Genres</option>
    <option value="Action">Action</option>
    <option value="Comedy">Comedy</option>
    <option value="Drama">Drama</option>
</select>

 <script src="script.js"></script>


</body>
</html>
